name: xinling

services:
  xinling-app:
    build:
      context: ./亲和之心-(sanctuary)
      dockerfile: Dockerfile
    image: xinling-team/sanctuary:latest
    ports:
      - "3000:3000"
    environment:
      # Optional: copy 亲和之心-(sanctuary)/src/.env.example to .env and fill keys
      NODE_ENV: production
